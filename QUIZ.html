<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> QUIZ </title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; }
        .impact-title { font-family: 'Impact', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        
        #quiz-section { padding: 60px 20px; text-align: center; }
        .quiz-card { 
            max-width: 700px; margin: 0 auto; background: white; 
            padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        
        .progress-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 30px; }
        #progress-bar { width: 0%; background: #2462bf; height: 100%; border-radius: 4px; transition: 0.3s; }
        
        .question-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 25px; color: #333; min-height: 60px; }
        
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { 
            padding: 15px 20px; border: 2px solid #eef0f3; border-radius: 10px; 
            background: white; cursor: pointer; text-align: left; font-size: 1.1rem; transition: 0.2s;
        }
        .option-btn:hover { background: #2462bf; color: white; border-color: #2462bf; transform: translateX(5px); }
        
        #result-container { display: none; }
        .profile-name { font-size: 2.2rem; color: #2462bf; margin: 10px 0; }
        .quote { border-left: 5px solid #2462bf; padding: 15px; background: #f9f9f9; font-style: italic; margin: 20px 0; text-align: left; }
        .btn-join { 
            background: #0d2c5e; color: white; border: none; padding: 15px 40px; 
            font-size: 1.2rem; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

<section id="quiz-section">
    <h2 class="impact-title" style="font-size: 4rem; color: #2462bf; margin-bottom: 10px;">ENCUENTRA TU LUGAR</h2>
    <p style="margin-bottom: 40px; color: #666;">Descubre cómo encajas en el ecosistema tecnológico de Hello World</p>

    <div class="quiz-card">
        <div id="quiz-ui">
            <div class="progress-container"><div id="progress-bar"></div></div>
            <p id="question-number" style="color: #2462bf; font-weight: bold; margin-bottom: 5px;"></p>
            <div class="question-text" id="question-text">Cargando pregunta...</div>
            <div class="options-container" id="options-container"></div>
        </div>

        <div id="result-container">
            <h3 style="margin: 0;">Tu perfil ideal es:</h3>
            <div class="profile-name" id="profile-name"></div>
            <div class="quote" id="profile-desc"></div>
            <p><strong>HelloWorld tiene un lugar para ti.</strong></p>
            <button class="btn-join">ÚNETE AL CLUB</button>
        </div>
    </div>
</section>

<script>
    const questions = [
        { q: "¿Qué te emociona más de un nuevo producto tecnológico?", a: "Cómo funciona por dentro", b: "Cómo se siente al usarlo", c: "Cómo conecta con la gente" },
        { q: "En un equipo de trabajo, ¿qué rol prefieres?", a: "El que construye la solución técnica", b: "El que diseña la interfaz", c: "El que comunica y presenta la idea" },
        { q: "¿Cuál es tu plataforma favorita para explorar?", a: "GitHub o Foros técnicos", b: "Behance o Instagram", c: "LinkedIn o TikTok" },
        { q: "Si una app falla, ¿qué es lo primero que piensas?", a: "Hay un error en el código", b: "La navegación es confusa", c: "El mensaje de error no es claro" },
        { q: "¿Qué herramienta te gustaría dominar?", a: "Lenguajes de programación", b: "Software de diseño/3D", c: "Estrategias de contenido y marketing" },
        { q: "¿Cómo resuelves un problema complejo?", a: "Analizando datos y lógica pura", b: "Dibujando mapas y prototipos", c: "Hablando y debatiendo con otros" },
        { q: "Al visitar una web, ¿qué es lo más importante?", a: "Que sea rápida y eficiente", b: "Que sea visualmente atractiva", c: "Que la información sea persuasiva" },
        { q: "¿Qué tipo de contenido prefieres crear?", a: "Documentación o scripts", b: "Gráficos o animaciones", c: "Artículos o guiones de video" },
        { q: "¿Qué área tech te llama más la atención?", a: "Backend e Inteligencia Artificial", b: "Frontend y Realidad Aumentada", c: "Social Media y Relaciones Públicas" },
        { q: "¿Cuál sería tu proyecto soñado?", a: "Desarrollar un sistema operativo", b: "Diseñar una experiencia inmersiva", c: "Liderar la comunicación de una Startup" },
        { q: "¿Qué prefieres optimizar?", a: "El rendimiento del servidor", b: "La satisfacción estética del usuario", c: "El impacto del mensaje en la audiencia" },
        { q: "En un Hackathon, ¿en qué destacarías?", a: "Escribiendo el código base", b: "Haciendo que todo se vea increíble", c: "Convenciendo a los jueces con el pitch" },
        { q: "¿Cómo te mantienes actualizado?", a: "Leyendo documentación técnica", b: "Siguiendo tendencias de diseño", c: "Escuchando podcasts y noticias de la industria" },
        { q: "Si el club hace un evento, ¿qué haces tú?", a: "Configuras la red y el streaming", b: "Diseñas toda la identidad visual", c: "Coordinas la difusión y a los invitados" },
        { q: "¿Qué piensas de la tecnología?", a: "Es una herramienta de resolución", b: "Es un lienzo para la creatividad", c: "Es el medio definitivo de conexión" },
        { q: "¿Cuál es tu mayor habilidad?", a: "Lógica y abstracción", b: "Empatía visual y estética", c: "Comunicación y persuasión" }
    ];

    let currentStep = 0;
    let scores = { a: 0, b: 0, c: 0 };

    function loadQuestion() {
        if (currentStep < questions.length) {
            const qData = questions[currentStep];
            document.getElementById('question-number').innerText = `Pregunta ${currentStep + 1} de 16`;
            document.getElementById('question-text').innerText = qData.q;
            document.getElementById('progress-bar').style.width = `${((currentStep) / questions.length) * 100}%`;
            
            const optionsHtml = `
                <button class="option-btn" onclick="selectOption('a')">A) ${qData.a}</button>
                <button class="option-btn" onclick="selectOption('b')">B) ${qData.b}</button>
                <button class="option-btn" onclick="selectOption('c')">C) ${qData.c}</button>
            `;
            document.getElementById('options-container').innerHTML = optionsHtml;
        } else {
            showResult();
        }
    }

    function selectOption(val) {
        scores[val]++;
        currentStep++;
        loadQuestion();
    }

    function showResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('progress-bar').style.width = '100%';

        let finalProfile = "";
        let finalDesc = "";

        if (scores.a >= scores.b && scores.a >= scores.c) {
            finalProfile = "Product Builder";
            finalDesc = "Eres el motor técnico. Te apasiona entender cómo funcionan las cosas y construir soluciones robustas desde el código.";
        } else if (scores.b >= scores.a && scores.b >= scores.c) {
            finalProfile = "Experience Designer";
            finalDesc = "Eres el alma creativa. Tu enfoque está en la estética, la usabilidad y en crear experiencias que enamoren al usuario.";
        } else {
            finalProfile = "Tech Evangelist";
            finalDesc = "Eres la voz del cambio. Tienes el don de comunicar ideas tecnológicas y conectar a las personas con la innovación.";
        }

        document.getElementById('profile-name').innerText = finalProfile;
        document.getElementById('profile-desc').innerText = finalDesc;
    }

    loadQuestion();
</script>

</body>
</html>
